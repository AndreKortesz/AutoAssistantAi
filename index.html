<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1F4FD8" />
    <meta name="description" content="AutoAssistantAi — умный помощник для вашего автомобиля" />
    <title>AutoAssistantAi</title>
    <link rel="icon" type="image/svg+xml" href="/logo-aaa.svg" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        background: #F7F8FA;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      /* Анимация «оживления» силуэта на главной */
      @keyframes aaaCarIn { 0% { transform: translateX(-40px); opacity: 0; } 100% { transform: translateX(0); opacity: 1; } }
      @keyframes aaaShine { 0% { transform: translateX(-60px) skewX(-18deg); opacity: 0; } 30% { opacity: .9; } 60% { opacity: 0; } 100% { transform: translateX(200px) skewX(-18deg); opacity: 0; } }
      .aaa-car-in { animation: aaaCarIn .7s cubic-bezier(.22,1,.36,1) both; }
      .aaa-shine { animation: aaaShine 1.1s ease-in .6s both; }
      @media (prefers-reduced-motion: reduce) {
        .aaa-car-in, .aaa-shine { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
